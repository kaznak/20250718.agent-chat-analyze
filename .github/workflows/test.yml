name: Tests

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run tests with basic dependencies only
      run: |
        python -m pytest tests/test_models.py tests/test_parsers.py -v --cov=agent_chat_analyze --cov-report=xml
    
    - name: Install ML dependencies
      run: |
        pip install sentence-transformers scikit-learn torch --index-url https://download.pytorch.org/whl/cpu
    
    - name: Run all tests
      run: |
        python -m pytest tests/ -v --cov=agent_chat_analyze --cov-report=xml --cov-append
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-basic:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"
    
    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov click duckdb pandas pydantic python-dateutil
    
    - name: Run core tests without ML dependencies
      run: |
        python -m pytest tests/test_models.py tests/test_parsers.py -v